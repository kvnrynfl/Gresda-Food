# ===================================================================
# Gresda Food — Nginx Server Block Configuration
# ===================================================================
# Copy this config to your Laragon Nginx config directory:
#   C:\laragon\etc\nginx\sites-enabled\gresda-food.test.conf
#
# Or include it from your main nginx.conf.
# Restart Nginx after applying changes.

server {
    listen 80;
    server_name gresda-food.kevinreynaufal.my.id;

    # Document root points directly to the public/ directory
    root /var/www/gresda-food/public;
    index index.php;

    access_log /var/log/nginx/gresda-food.access.log;
    error_log /var/log/nginx/gresda-food.error.log;

    # Disable directory listing (replaces: Options -Indexes)
    autoindex off;

    # Max upload size (matches Upload.php max: 5MB, +1MB buffer)
    client_max_body_size 6M;

    # ─── Charset ─────────────────────────────────────────────────────
    charset utf-8;

    # ─── Main URL Rewriting ──────────────────────────────────────────
    # Replaces both .htaccess files:
    # 1. Root .htaccess → redirecting to public/ (handled by root directive)
    # 2. public/.htaccess → rewriting to index.php?url=...
    location / {
        try_files $uri $uri/ /index.php?url=$uri&$args;
    }

    # ─── Static Assets Caching ───────────────────────────────────────
    # Cache images and static files for better performance
    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── PHP Processing ──────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeout settings for long uploads/processing
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # ─── Security: Block sensitive files ─────────────────────────────
    # Block .htaccess, .env, .git, and other dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block direct access to app/, database/, storage/, vendor/ directories
    # (These are outside root so already inaccessible, but extra safety)
    location ~* ^/(app|database|storage|vendor|composer\.(json|lock)|migrate\.php) {
        deny all;
    }

    # ─── Error Pages ─────────────────────────────────────────────────
    error_page 404 /index.php;
}
